version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: teq_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    build: .
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    env_file:
      - .env.example
volumes:
  pgdata:
